<div class="container">
  <div class="tabs">
    <button [class.active]="vista === 'gestionar'" (click)="vista = 'gestionar'">Gestión de Órdenes</button>
    <button [class.active]="vista === 'crear'" (click)="vista = 'crear'">Crear Orden</button>
  </div>

  <div *ngIf="vista === 'gestionar'">
    <h2>Gestión de Órdenes</h2>

    <form (ngSubmit)="buscarOrdenes()" class="form">
      <input type="text" [(ngModel)]="licensePlate" name="licensePlate" placeholder="Placa del vehículo" required />
      <button type="submit">Buscar órdenes</button>
    </form>

    <div *ngIf="mensaje" class="success">{{ mensaje }}</div>
    <div *ngIf="error" class="error">{{ error }}</div>

    <table *ngIf="ordenes.length > 0">
      <thead>
        <tr>
          <th>Placa</th>
          <th>Tipo</th>
          <th>Descripción</th>
          <th>Fecha</th>
          <th>Estado</th>
          <th>Costo</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let orden of ordenes">
          <td>{{ orden.licensePlate }}</td>
          <td>{{ orden.type }}</td>
          <td>{{ orden.description }}</td>
          <td>{{ orden.date }}</td>
          <td>
            <select [(ngModel)]="orden.status" (change)="onEstadoChange(orden)" [ngModelOptions]="{ standalone: true }">
              <option *ngFor="let estado of estados" [value]="estado">{{ estado }}</option>
            </select>
          </td>
          <td>{{ orden.cost | currency : 'COP' : 'symbol' : '1.0-0' }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="vista === 'crear'">
    <h2>Crear Nueva Orden</h2>

    <form (ngSubmit)="crearOrden()" class="form">
      <input type="text" [(ngModel)]="licensePlate" name="placaNueva" placeholder="Placa del vehículo" required />
      <input type="text" [(ngModel)]="nuevaOrden.tipo" name="tipo" placeholder="Tipo de orden" required />
      <input type="text" [(ngModel)]="nuevaOrden.descripcion" name="descripcion" placeholder="Descripción" required />
      <input type="date" [(ngModel)]="nuevaOrden.fecha" name="fecha" required />
      <select [(ngModel)]="nuevaOrden.estado" name="estado" required>
        <option value="" disabled selected>Selecciona estado</option>
        <option *ngFor="let estado of estados" [value]="estado">{{ estado }}</option>
      </select>
      <input type="number" [(ngModel)]="nuevaOrden.costo" name="costo" placeholder="Costo" required />
      <button type="submit">Crear orden</button>
    </form>

    <div *ngIf="mensaje" class="success">{{ mensaje }}</div>
    <div *ngIf="error" class="error">{{ error }}</div>
  </div>
</div>
